<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e639c"/>
      <stop offset="100%" stop-color="#1177bb"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Database icon (3-layer cylinder) -->
  <ellipse cx="52" cy="42" rx="24" ry="10" fill="none" stroke="url(#lens)" stroke-width="3"/>
  <path d="M28 42v20c0 5.5 10.7 10 24 10s24-4.5 24-10V42" fill="none" stroke="url(#lens)" stroke-width="3"/>
  <path d="M28 52c0 5.5 10.7 10 24 10s24-4.5 24-10" fill="none" stroke="url(#lens)" stroke-width="3" opacity="0.6"/>
  <path d="M28 62c0 5.5 10.7 10 24 10s24-4.5 24-10" fill="none" stroke="url(#lens)" stroke-width="3" opacity="0.4"/>
  <!-- Magnifying glass (lens) -->
  <circle cx="82" cy="78" r="16" fill="none" stroke="url(#lens)" stroke-width="3.5"/>
  <line x1="93" y1="90" x2="104" y2="101" stroke="url(#lens)" stroke-width="4" stroke-linecap="round"/>
  <!-- Small sparkle inside lens -->
  <circle cx="76" cy="73" r="2" fill="white" opacity="0.7"/>
</svg>
