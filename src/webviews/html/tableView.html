<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    >
    <title>Table View</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            font-size: var(--vscode-font-size, 13px);
            line-height: 1.4;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Toolbar ──────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--vscode-sideBar-background, var(--vscode-editor-background));
            border-bottom: 1px solid var(--vscode-widget-border, #333);
            flex-shrink: 0;
        }

        .table-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--vscode-editor-foreground);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .table-icon {
            color: var(--vscode-textLink-foreground, #4fc1ff);
            font-size: 14px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 340px;
        }

        .search-box .ico {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--vscode-input-placeholderForeground);
            pointer-events: none;
            font-size: 12px;
        }

        .search-input {
            width: 100%;
            padding: 6px 12px 6px 30px;
            background: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border, transparent);
            border-radius: 6px;
            color: var(--vscode-input-foreground);
            font-size: 12.5px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input::placeholder { color: var(--vscode-input-placeholderForeground); }
        .search-input:focus { border-color: var(--vscode-focusBorder); }

        .spacer { flex: 1; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn-primary {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        .btn-primary:hover { background: var(--vscode-button-hoverBackground); }
        .btn-secondary {
            background: var(--vscode-button-secondaryBackground, #333);
            color: var(--vscode-button-secondaryForeground, #ccc);
        }
        .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground, #444); }

        /* ── Table ────────────────────────────────────── */
        .table-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        table.data-grid {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            min-width: max-content;
        }

        table.data-grid thead { position: sticky; top: 0; z-index: 2; }

        table.data-grid th {
            background: var(--vscode-editorGroupHeader-tabsBackground, var(--vscode-sideBar-background));
            color: var(--vscode-textLink-foreground, #4fc1ff);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 8px 14px;
            border-bottom: 2px solid var(--vscode-focusBorder);
            border-right: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.15));
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }
        table.data-grid th:hover { background: var(--vscode-list-hoverBackground); }
        table.data-grid th:last-child { border-right: none; }

        .sort-arrow {
            display: inline-block;
            margin-left: 6px;
            font-size: 10px;
            color: var(--vscode-focusBorder);
        }

        table.data-grid td {
            padding: 6px 14px;
            border-bottom: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.12));
            border-right: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.08));
            font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
            font-size: 12px;
            white-space: nowrap;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
        }
        table.data-grid td:last-child { border-right: none; }

        table.data-grid tbody tr:hover { background: var(--vscode-list-hoverBackground); }
        table.data-grid tbody tr:nth-child(even) {
            background: var(--vscode-editorGroupHeader-tabsBackground, rgba(128,128,128,0.03));
        }
        table.data-grid tbody tr:nth-child(even):hover { background: var(--vscode-list-hoverBackground); }

        table.data-grid td.cell-clicked {
            outline: 2px solid var(--vscode-focusBorder);
            outline-offset: -2px;
        }

        .cell-null { color: var(--vscode-descriptionForeground); font-style: italic; }
        .cell-number { color: var(--vscode-debugTokenExpression-number, #b5cea8); text-align: right; }
        .cell-boolean { color: var(--vscode-debugTokenExpression-boolean, #569cd6); }

        table.data-grid th.row-num,
        table.data-grid td.row-num {
            color: var(--vscode-editorLineNumber-foreground, #555);
            text-align: right;
            padding: 6px 10px;
            font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
            font-size: 11px;
            border-right: 2px solid var(--vscode-widget-border, #404040);
            cursor: default;
            width: 55px;
            min-width: 55px;
            user-select: none;
        }
        table.data-grid th.row-num { text-transform: none; letter-spacing: normal; font-weight: normal; cursor: default; }

        /* ── Pagination ───────────────────────────────── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 14px;
            background: var(--vscode-sideBar-background, var(--vscode-editor-background));
            border-top: 1px solid var(--vscode-widget-border, #333);
            flex-shrink: 0;
        }

        .page-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 30px;
            padding: 0 10px;
            background: var(--vscode-button-secondaryBackground, #333);
            color: var(--vscode-button-secondaryForeground, #ccc);
            border: 1px solid var(--vscode-widget-border, #444);
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.12s;
        }
        .page-btn:hover:not(:disabled) { background: var(--vscode-button-secondaryHoverBackground, #444); }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-btn.active {
            background: var(--vscode-button-background);
            border-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            font-weight: 600;
        }

        .page-ellipsis { color: var(--vscode-descriptionForeground); padding: 0 4px; font-size: 12px; user-select: none; }

        /* ── Status Bar ───────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 6px 14px;
            background: var(--vscode-statusBar-background, #007acc);
            color: var(--vscode-statusBar-foreground, #fff);
            font-size: 12px;
            flex-shrink: 0;
        }
        .status-bar .item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        .status-bar .spacer { flex: 1; }

        /* ── States ───────────────────────────────────── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--vscode-editor-background);
            opacity: 0.85;
            z-index: 10;
        }
        .loading-overlay.hidden { display: none; }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid var(--vscode-widget-border, #333);
            border-top-color: var(--vscode-focusBorder);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            padding: 10px 14px;
            background: var(--vscode-inputValidation-errorBackground, #2d1111);
            border-bottom: 1px solid var(--vscode-inputValidation-errorBorder, #8b3030);
            color: var(--vscode-errorForeground, #f48771);
            font-size: 13px;
            flex-shrink: 0;
        }
        .error-banner.hidden { display: none; }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--vscode-descriptionForeground);
            font-size: 13px;
        }
        .empty-state.hidden { display: none; }

        /* ── Toast ─────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--vscode-editorWidget-background, #252526);
            color: var(--vscode-editorWidget-foreground, #ccc);
            border: 1px solid var(--vscode-widget-border, #454545);
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="app">
        <div class="toolbar">
            <span class="table-icon">&#9783;</span>
            <span class="table-name" id="tableName">Table</span>
            <div class="search-box">
                <span class="ico">&#128269;</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Filter rows... (WHERE clause)" spellcheck="false" autocomplete="off">
            </div>
            <div class="spacer"></div>
            <button class="btn btn-secondary" id="refreshBtn" title="Refresh data">&#8635; Refresh</button>
            <button class="btn btn-primary" id="exportBtn" title="Export to CSV">&#8615; Export CSV</button>
        </div>

        <div class="error-banner hidden" id="errorBanner"></div>

        <div class="table-container" id="tableContainer">
            <div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>
            <table class="data-grid" id="dataGrid">
                <thead id="gridHead"></thead>
                <tbody id="gridBody"></tbody>
            </table>
            <div class="empty-state hidden" id="emptyState">No data to display.</div>
        </div>

        <div class="pagination" id="pagination"></div>

        <div class="status-bar" id="statusBar">
            <span class="item" id="statusRows">Rows: --</span>
            <span class="item" id="statusPage">Page: --</span>
            <span class="item" id="statusExecTime">Time: --</span>
            <span class="spacer"></span>
            <span class="item" id="statusPageSize">50 rows/page</span>
        </div>
    </div>

    <div class="toast" id="copyToast">Copied!</div>

    <script>
        const vscode = acquireVsCodeApi();

        let state = {
            columns: [], rows: [], totalRows: 0, page: 1, pageSize: 50,
            totalPages: 1, sortColumn: null, sortDirection: null, executionTimeMs: 0, tableName: 'Table',
        };

        const tableName      = document.getElementById('tableName');
        const searchInput    = document.getElementById('searchInput');
        const refreshBtn     = document.getElementById('refreshBtn');
        const exportBtn      = document.getElementById('exportBtn');
        const errorBanner    = document.getElementById('errorBanner');
        const tableContainer = document.getElementById('tableContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const gridHead       = document.getElementById('gridHead');
        const gridBody       = document.getElementById('gridBody');
        const emptyState     = document.getElementById('emptyState');
        const pagination     = document.getElementById('pagination');
        const statusRows     = document.getElementById('statusRows');
        const statusPage     = document.getElementById('statusPage');
        const statusExecTime = document.getElementById('statusExecTime');
        const copyToast      = document.getElementById('copyToast');

        function esc(str) { if (str === null || str === undefined) return str; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function fmtNum(n) { return Number(n).toLocaleString(); }
        function isNum(v) { if (v === null || v === undefined || v === '') return false; return !isNaN(Number(v)) && isFinite(v); }
        function isBool(v) { if (typeof v === 'boolean') return true; if (typeof v === 'string') { var l = v.toLowerCase(); return l === 'true' || l === 'false'; } return false; }

        let toastTimeout = null;
        function showToast(text) {
            copyToast.textContent = text || 'Copied!';
            copyToast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() { copyToast.classList.remove('visible'); }, 1500);
        }

        function renderHead() {
            let html = '<tr><th class="row-num">#</th>';
            state.columns.forEach(function(col) {
                let arrow = '';
                if (state.sortColumn === col) arrow = state.sortDirection === 'ASC' ? '<span class="sort-arrow">&#9650;</span>' : '<span class="sort-arrow">&#9660;</span>';
                html += '<th data-column="' + esc(col) + '">' + esc(col) + arrow + '</th>';
            });
            html += '</tr>';
            gridHead.innerHTML = html;
        }

        function renderBody() {
            if (!state.rows || state.rows.length === 0) { gridBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            const startIdx = (state.page - 1) * state.pageSize;
            let html = '';
            state.rows.forEach(function(row, i) {
                html += '<tr><td class="row-num">' + (startIdx + i + 1) + '</td>';
                state.columns.forEach(function(col) {
                    const val = row[col];
                    if (val === null || val === undefined) html += '<td class="cell-null" data-raw="">NULL</td>';
                    else if (isBool(val)) html += '<td class="cell-boolean" data-raw="' + esc(val) + '">' + esc(val) + '</td>';
                    else if (isNum(val)) html += '<td class="cell-number" data-raw="' + esc(val) + '">' + esc(val) + '</td>';
                    else html += '<td data-raw="' + esc(val) + '">' + esc(val) + '</td>';
                });
                html += '</tr>';
            });
            gridBody.innerHTML = html;
        }

        function renderPagination() {
            const total = state.totalPages, current = state.page;
            if (total <= 1) { pagination.innerHTML = ''; return; }
            let html = '<button class="page-btn" id="prevPageBtn"' + (current <= 1 ? ' disabled' : '') + '>&laquo; Prev</button>';
            buildPageNums(current, total).forEach(function(p) {
                if (p === '...') html += '<span class="page-ellipsis">...</span>';
                else html += '<button class="page-btn' + (p === current ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
            });
            html += '<button class="page-btn" id="nextPageBtn"' + (current >= total ? ' disabled' : '') + '>Next &raquo;</button>';
            pagination.innerHTML = html;
        }

        function buildPageNums(cur, total) {
            if (total <= 7) { var a = []; for (var i = 1; i <= total; i++) a.push(i); return a; }
            var p = [1], s = Math.max(2, cur - 1), e = Math.min(total - 1, cur + 1);
            if (s > 2) p.push('...'); for (var j = s; j <= e; j++) p.push(j); if (e < total - 1) p.push('...');
            p.push(total); return p;
        }

        function renderStatus() {
            statusRows.textContent = 'Rows: ' + fmtNum(state.totalRows);
            statusPage.textContent = 'Page ' + state.page + ' of ' + state.totalPages;
            statusExecTime.textContent = 'Time: ' + state.executionTimeMs + ' ms';
        }

        function render() {
            tableName.textContent = state.tableName || 'Table';
            tableName.title = state.tableName || 'Table';
            renderHead(); renderBody(); renderPagination(); renderStatus(); hideLoading();
        }

        function showLoading() { loadingOverlay.classList.remove('hidden'); }
        function hideLoading() { loadingOverlay.classList.add('hidden'); }
        function showError(msg) { errorBanner.textContent = msg; errorBanner.classList.remove('hidden'); }
        function hideError() { errorBanner.classList.add('hidden'); }
        function send(msg) { vscode.postMessage(msg); }

        gridHead.addEventListener('click', function(e) {
            var th = e.target.closest('th[data-column]'); if (!th) return;
            showLoading(); send({ type: 'sort', column: th.getAttribute('data-column') });
        });

        let clickedCell = null;
        gridBody.addEventListener('click', function(e) {
            var td = e.target.closest('td:not(.row-num)'); if (!td) return;
            if (clickedCell) clickedCell.classList.remove('cell-clicked');
            td.classList.add('cell-clicked'); clickedCell = td;
            var raw = td.getAttribute('data-raw');
            if (raw !== null && raw !== '') navigator.clipboard.writeText(raw).then(function() { showToast('Copied to clipboard'); }).catch(function() {});
        });

        pagination.addEventListener('click', function(e) {
            var btn = e.target.closest('button'); if (!btn || btn.disabled) return;
            if (btn.id === 'prevPageBtn') { showLoading(); send({ type: 'prevPage' }); }
            else if (btn.id === 'nextPageBtn') { showLoading(); send({ type: 'nextPage' }); }
            else if (btn.dataset.page) { var pg = parseInt(btn.dataset.page, 10); if (pg !== state.page) { showLoading(); send({ type: 'goToPage', page: pg }); } }
        });

        let searchTimeout = null;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() { showLoading(); send({ type: 'filter', filter: searchInput.value }); }, 300);
        });

        refreshBtn.addEventListener('click', function() { showLoading(); hideError(); send({ type: 'refresh' }); });
        exportBtn.addEventListener('click', function() { send({ type: 'export' }); });

        window.addEventListener('message', function(event) {
            var msg = event.data; if (!msg || !msg.type) return;
            switch (msg.type) {
                case 'data':
                    hideError();
                    state.columns = msg.columns || []; state.rows = msg.rows || []; state.totalRows = msg.totalRows || 0;
                    state.page = msg.page || 1; state.pageSize = msg.pageSize || 50; state.totalPages = msg.totalPages || 1;
                    state.sortColumn = msg.sortColumn || null; state.sortDirection = msg.sortDirection || null;
                    state.executionTimeMs = msg.executionTimeMs || 0; state.tableName = msg.tableName || 'Table';
                    render(); tableContainer.scrollTop = 0; break;
                case 'error': hideLoading(); showError(msg.message || 'An unknown error occurred.'); break;
            }
        });

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); searchInput.focus(); searchInput.select(); return; }
            if (document.activeElement === searchInput) return;
            if (e.key === 'ArrowLeft' && state.page > 1) { showLoading(); send({ type: 'prevPage' }); }
            if (e.key === 'ArrowRight' && state.page < state.totalPages) { showLoading(); send({ type: 'nextPage' }); }
        });

        showLoading();
    </script>
</body>
</html>
