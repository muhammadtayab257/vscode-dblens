<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    >
    <title>Table View</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            font-size: var(--vscode-font-size, 13px);
            line-height: 1.4;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Toolbar ──────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--vscode-sideBar-background, var(--vscode-editor-background));
            border-bottom: 1px solid var(--vscode-widget-border, #333);
            flex-shrink: 0;
        }

        .table-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--vscode-editor-foreground);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .table-icon {
            color: var(--vscode-textLink-foreground, #4fc1ff);
            font-size: 14px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 340px;
        }

        .search-box .ico {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--vscode-input-placeholderForeground);
            pointer-events: none;
            font-size: 12px;
        }

        .search-input {
            width: 100%;
            padding: 6px 12px 6px 30px;
            background: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border, transparent);
            border-radius: 6px;
            color: var(--vscode-input-foreground);
            font-size: 12.5px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input::placeholder { color: var(--vscode-input-placeholderForeground); }
        .search-input:focus { border-color: var(--vscode-focusBorder); }

        .spacer { flex: 1; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn-primary {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        .btn-primary:hover { background: var(--vscode-button-hoverBackground); }
        .btn-secondary {
            background: var(--vscode-button-secondaryBackground, #333);
            color: var(--vscode-button-secondaryForeground, #ccc);
        }
        .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground, #444); }

        /* ── Table ────────────────────────────────────── */
        .table-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        table.data-grid {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            min-width: max-content;
        }

        table.data-grid thead { position: sticky; top: 0; z-index: 2; }

        table.data-grid th {
            background: var(--vscode-editorGroupHeader-tabsBackground, var(--vscode-sideBar-background));
            color: var(--vscode-textLink-foreground, #4fc1ff);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 8px 14px;
            border-bottom: 2px solid var(--vscode-focusBorder);
            border-right: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.15));
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }
        table.data-grid th:hover { background: var(--vscode-list-hoverBackground); }
        table.data-grid th:last-child { border-right: none; }

        .sort-arrow {
            display: inline-block;
            margin-left: 6px;
            font-size: 10px;
            color: var(--vscode-focusBorder);
        }

        table.data-grid td {
            padding: 6px 14px;
            border-bottom: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.12));
            border-right: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.08));
            font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
            font-size: 12px;
            white-space: nowrap;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
        }
        table.data-grid td:last-child { border-right: none; }

        table.data-grid tbody tr:hover { background: var(--vscode-list-hoverBackground); }
        table.data-grid tbody tr:nth-child(even) {
            background: var(--vscode-editorGroupHeader-tabsBackground, rgba(128,128,128,0.03));
        }
        table.data-grid tbody tr:nth-child(even):hover { background: var(--vscode-list-hoverBackground); }

        table.data-grid td.cell-clicked {
            outline: 2px solid var(--vscode-focusBorder);
            outline-offset: -2px;
        }

        .cell-null { color: var(--vscode-descriptionForeground); font-style: italic; }
        .cell-number { color: var(--vscode-debugTokenExpression-number, #b5cea8); text-align: right; }
        .cell-boolean { color: var(--vscode-debugTokenExpression-boolean, #569cd6); }

        .cell-fk {
            color: var(--vscode-textLink-foreground, #4fc1ff);
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 2px;
        }
        .cell-fk:hover {
            text-decoration-style: solid;
            background: rgba(79,193,255,0.1);
        }

        table.data-grid th.row-num,
        table.data-grid td.row-num {
            color: var(--vscode-editorLineNumber-foreground, #555);
            text-align: right;
            padding: 6px 10px;
            font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
            font-size: 11px;
            border-right: 2px solid var(--vscode-widget-border, #404040);
            cursor: default;
            width: 55px;
            min-width: 55px;
            user-select: none;
        }
        table.data-grid th.row-num { text-transform: none; letter-spacing: normal; font-weight: normal; cursor: default; }

        /* ── Pagination ───────────────────────────────── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 14px;
            background: var(--vscode-sideBar-background, var(--vscode-editor-background));
            border-top: 1px solid var(--vscode-widget-border, #333);
            flex-shrink: 0;
        }

        .page-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 30px;
            padding: 0 10px;
            background: var(--vscode-button-secondaryBackground, #333);
            color: var(--vscode-button-secondaryForeground, #ccc);
            border: 1px solid var(--vscode-widget-border, #444);
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.12s;
        }
        .page-btn:hover:not(:disabled) { background: var(--vscode-button-secondaryHoverBackground, #444); }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-btn.active {
            background: var(--vscode-button-background);
            border-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            font-weight: 600;
        }

        .page-ellipsis { color: var(--vscode-descriptionForeground); padding: 0 4px; font-size: 12px; user-select: none; }

        /* ── Inline Editing ───────────────────────────── */
        table.data-grid td.editable { cursor: text; }
        table.data-grid td.editable:hover { background: rgba(79,193,255,0.06); }
        table.data-grid td.editing {
            padding: 0;
            outline: 2px solid var(--vscode-focusBorder);
            outline-offset: -2px;
        }
        table.data-grid td.editing input {
            width: 100%;
            padding: 6px 14px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: none;
            outline: none;
            font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
            font-size: 12px;
        }
        table.data-grid td.cell-modified {
            background: rgba(255,200,0,0.12) !important;
            border-left: 2px solid #e2b714;
        }
        table.data-grid tr.row-new { background: rgba(34,165,89,0.1) !important; }
        table.data-grid tr.row-new td { border-left: 2px solid #22a559; }
        table.data-grid tr.row-deleted { opacity: 0.4; text-decoration: line-through; }
        table.data-grid tr.row-deleted td { background: rgba(241,76,76,0.08) !important; }

        table.data-grid th.check-col,
        table.data-grid td.check-col {
            width: 32px; min-width: 32px; max-width: 32px;
            text-align: center;
            padding: 4px;
            cursor: pointer;
        }
        table.data-grid td.check-col input { cursor: pointer; accent-color: var(--vscode-focusBorder); }

        /* ── Changes Bar ─────────────────────────────── */
        .changes-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: rgba(255,200,0,0.08);
            border-top: 1px solid rgba(255,200,0,0.3);
            border-bottom: 1px solid rgba(255,200,0,0.3);
            flex-shrink: 0;
            font-size: 12px;
        }
        .changes-bar.active { display: flex; }
        .changes-bar .changes-count { color: var(--vscode-editor-foreground); font-weight: 600; }
        .changes-bar .spacer { flex: 1; }
        .changes-bar .btn-save {
            padding: 5px 14px; border: none; border-radius: 5px; font-size: 12px; font-weight: 600;
            font-family: inherit; cursor: pointer;
            background: #22a559; color: #fff;
        }
        .changes-bar .btn-save:hover { background: #1d8f4c; }
        .changes-bar .btn-discard {
            padding: 5px 14px; border: 1px solid var(--vscode-widget-border, #555); border-radius: 5px;
            font-size: 12px; font-family: inherit; cursor: pointer;
            background: transparent; color: var(--vscode-editor-foreground);
        }
        .changes-bar .btn-discard:hover { background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.15)); }

        .no-pk-msg {
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            padding: 4px 14px;
            background: rgba(128,128,128,0.06);
            border-bottom: 1px solid var(--vscode-widget-border, #333);
            flex-shrink: 0;
        }
        .no-pk-msg.hidden { display: none; }

        /* ── Status Bar ───────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 6px 14px;
            background: var(--vscode-statusBar-background, #007acc);
            color: var(--vscode-statusBar-foreground, #fff);
            font-size: 12px;
            flex-shrink: 0;
        }
        .status-bar .item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        .status-bar .spacer { flex: 1; }

        /* ── States ───────────────────────────────────── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--vscode-editor-background);
            opacity: 0.85;
            z-index: 10;
        }
        .loading-overlay.hidden { display: none; }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid var(--vscode-widget-border, #333);
            border-top-color: var(--vscode-focusBorder);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            padding: 10px 14px;
            background: var(--vscode-inputValidation-errorBackground, #2d1111);
            border-bottom: 1px solid var(--vscode-inputValidation-errorBorder, #8b3030);
            color: var(--vscode-errorForeground, #f48771);
            font-size: 13px;
            flex-shrink: 0;
        }
        .error-banner.hidden { display: none; }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--vscode-descriptionForeground);
            font-size: 13px;
        }
        .empty-state.hidden { display: none; }

        /* ── Toast ─────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--vscode-editorWidget-background, #252526);
            color: var(--vscode-editorWidget-foreground, #ccc);
            border: 1px solid var(--vscode-widget-border, #454545);
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="app">
        <div class="toolbar">
            <span class="table-icon">&#9783;</span>
            <span class="table-name" id="tableName">Table</span>
            <div class="search-box">
                <span class="ico">&#128269;</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Filter rows... (WHERE clause)" spellcheck="false" autocomplete="off">
            </div>
            <div class="spacer"></div>
            <button class="btn btn-secondary" id="addRowBtn" title="Insert new row" style="background:#22a559;color:#fff;border:none;">+ Add Row</button>
            <button class="btn btn-secondary" id="deleteRowsBtn" title="Delete selected rows" disabled style="background:transparent;color:var(--vscode-errorForeground,#f14c4c);border:1px solid var(--vscode-errorForeground,#f14c4c);">Delete Selected</button>
            <div style="width:1px;height:20px;background:var(--vscode-widget-border,#444);margin:0 4px;"></div>
            <button class="btn btn-secondary" id="refreshBtn" title="Refresh data">&#8635; Refresh</button>
            <button class="btn btn-primary" id="exportBtn" title="Export to CSV">&#8615; Export CSV</button>
        </div>

        <div class="no-pk-msg hidden" id="noPkMsg">&#9888; This table has no primary key — editing is disabled. Add a primary key to enable inline editing.</div>

        <!-- Changes Bar -->
        <div class="changes-bar" id="changesBar">
            <span class="changes-count" id="changesCount">0 pending changes</span>
            <span class="spacer"></span>
            <button class="btn-discard" id="discardBtn">Discard</button>
            <button class="btn-save" id="saveBtn">Save Changes</button>
        </div>

        <div class="error-banner hidden" id="errorBanner"></div>

        <div class="table-container" id="tableContainer">
            <div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>
            <table class="data-grid" id="dataGrid">
                <thead id="gridHead"></thead>
                <tbody id="gridBody"></tbody>
            </table>
            <div class="empty-state hidden" id="emptyState">No data to display.</div>
        </div>

        <div class="pagination" id="pagination"></div>

        <div class="status-bar" id="statusBar">
            <span class="item" id="statusRows">Rows: --</span>
            <span class="item" id="statusPage">Page: --</span>
            <span class="item" id="statusExecTime">Time: --</span>
            <span class="spacer"></span>
            <span class="item" id="statusPageSize">50 rows/page</span>
        </div>
    </div>

    <div class="toast" id="copyToast">Copied!</div>

    <script>
        const vscode = acquireVsCodeApi();

        let state = {
            columns: [], rows: [], totalRows: 0, page: 1, pageSize: 50,
            totalPages: 1, sortColumn: null, sortDirection: null, executionTimeMs: 0, tableName: 'Table',
            primaryKeys: [],
        };

        // Editing state
        var pendingChanges = [];
        var newRows = [];
        var deletedRowIdxs = new Set();
        var editedCells = {};
        var canEdit = false;

        // FK navigation
        var fkMap = {}; // column => { toTable, toColumn }

        const tableName      = document.getElementById('tableName');
        const searchInput    = document.getElementById('searchInput');
        const refreshBtn     = document.getElementById('refreshBtn');
        const exportBtn      = document.getElementById('exportBtn');
        const errorBanner    = document.getElementById('errorBanner');
        const tableContainer = document.getElementById('tableContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const gridHead       = document.getElementById('gridHead');
        const gridBody       = document.getElementById('gridBody');
        const emptyState     = document.getElementById('emptyState');
        const pagination     = document.getElementById('pagination');
        const statusRows     = document.getElementById('statusRows');
        const statusPage     = document.getElementById('statusPage');
        const statusExecTime = document.getElementById('statusExecTime');
        const copyToast      = document.getElementById('copyToast');
        const addRowBtn      = document.getElementById('addRowBtn');
        const deleteRowsBtn  = document.getElementById('deleteRowsBtn');
        const changesBar     = document.getElementById('changesBar');
        const changesCount   = document.getElementById('changesCount');
        const saveBtn        = document.getElementById('saveBtn');
        const discardBtn     = document.getElementById('discardBtn');
        const noPkMsg        = document.getElementById('noPkMsg');

        function esc(str) { if (str === null || str === undefined) return str; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function fmtNum(n) { return Number(n).toLocaleString(); }
        function isNum(v) { if (v === null || v === undefined || v === '') return false; return !isNaN(Number(v)) && isFinite(v); }
        function isBool(v) { if (typeof v === 'boolean') return true; if (typeof v === 'string') { var l = v.toLowerCase(); return l === 'true' || l === 'false'; } return false; }

        let toastTimeout = null;
        function showToast(text) {
            copyToast.textContent = text || 'Copied!';
            copyToast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() { copyToast.classList.remove('visible'); }, 1500);
        }

        function renderHead() {
            let html = '<tr>';
            if (canEdit) html += '<th class="check-col"><input type="checkbox" id="selectAll" title="Select all"></th>';
            html += '<th class="row-num">#</th>';
            state.columns.forEach(function(col) {
                let arrow = '';
                if (state.sortColumn === col) arrow = state.sortDirection === 'ASC' ? '<span class="sort-arrow">&#9650;</span>' : '<span class="sort-arrow">&#9660;</span>';
                var isPk = state.primaryKeys.indexOf(col) >= 0;
                html += '<th data-column="' + esc(col) + '">' + (isPk ? '&#128273; ' : '') + esc(col) + arrow + '</th>';
            });
            html += '</tr>';
            gridHead.innerHTML = html;

            if (canEdit) {
                var selectAll = document.getElementById('selectAll');
                if (selectAll) {
                    selectAll.addEventListener('change', function() {
                        var boxes = gridBody.querySelectorAll('.row-check');
                        boxes.forEach(function(b) { b.checked = selectAll.checked; });
                        updateDeleteBtn();
                    });
                }
            }
        }

        function renderBody() {
            var allRows = newRows.concat(state.rows || []);
            if (allRows.length === 0) { gridBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            var startIdx = (state.page - 1) * state.pageSize;
            var html = '';

            // Render new rows first
            newRows.forEach(function(row, ni) {
                html += '<tr class="row-new" data-newrow="' + ni + '">';
                if (canEdit) html += '<td class="check-col"><input type="checkbox" class="row-check" data-newrow="' + ni + '"></td>';
                html += '<td class="row-num">+</td>';
                state.columns.forEach(function(col) {
                    var val = row[col] !== undefined ? row[col] : '';
                    html += '<td class="editable" data-col="' + esc(col) + '" data-newrow="' + ni + '" data-raw="' + esc(val) + '">' + (val === '' ? '<span style="opacity:0.3">click to edit</span>' : esc(val)) + '</td>';
                });
                html += '</tr>';
            });

            // Render existing rows
            (state.rows || []).forEach(function(row, i) {
                var isDeleted = deletedRowIdxs.has(i);
                html += '<tr' + (isDeleted ? ' class="row-deleted"' : '') + ' data-rowidx="' + i + '">';
                if (canEdit) html += '<td class="check-col"><input type="checkbox" class="row-check" data-rowidx="' + i + '"' + (isDeleted ? ' checked disabled' : '') + '></td>';
                html += '<td class="row-num">' + (startIdx + i + 1) + '</td>';
                state.columns.forEach(function(col) {
                    var cellKey = i + ':' + col;
                    var val = editedCells[cellKey] !== undefined ? editedCells[cellKey] : row[col];
                    var isModified = editedCells[cellKey] !== undefined;
                    var isPk = state.primaryKeys.indexOf(col) >= 0;
                    var cls = canEdit && !isDeleted && !isPk ? ' editable' : '';
                    if (isModified) cls += ' cell-modified';

                    var isFk = fkMap[col] && val !== null && val !== undefined;
                    var fkAttr = isFk ? ' data-fk-table="' + esc(fkMap[col].toTable) + '" data-fk-col="' + esc(fkMap[col].toColumn) + '"' : '';
                    var fkCls = isFk ? ' cell-fk' : '';

                    if (val === null || val === undefined) html += '<td class="cell-null' + cls + '" data-col="' + esc(col) + '" data-rowidx="' + i + '" data-raw="">NULL</td>';
                    else if (isFk) html += '<td class="cell-fk' + cls + '" data-col="' + esc(col) + '" data-rowidx="' + i + '" data-raw="' + esc(val) + '"' + fkAttr + '>' + esc(val) + ' &#8599;</td>';
                    else if (isBool(val)) html += '<td class="cell-boolean' + cls + '" data-col="' + esc(col) + '" data-rowidx="' + i + '" data-raw="' + esc(val) + '">' + esc(val) + '</td>';
                    else if (isNum(val)) html += '<td class="cell-number' + cls + '" data-col="' + esc(col) + '" data-rowidx="' + i + '" data-raw="' + esc(val) + '">' + esc(val) + '</td>';
                    else html += '<td' + (cls ? ' class="' + cls.trim() + '"' : '') + ' data-col="' + esc(col) + '" data-rowidx="' + i + '" data-raw="' + esc(val) + '">' + esc(val) + '</td>';
                });
                html += '</tr>';
            });
            gridBody.innerHTML = html;

            // Attach checkbox listeners
            gridBody.querySelectorAll('.row-check').forEach(function(cb) {
                cb.addEventListener('change', updateDeleteBtn);
            });
        }

        function updateDeleteBtn() {
            var checked = gridBody.querySelectorAll('.row-check:checked').length;
            deleteRowsBtn.disabled = checked === 0;
        }

        function updateChangesBar() {
            var count = Object.keys(editedCells).length + newRows.length + deletedRowIdxs.size;
            if (count > 0) {
                changesBar.classList.add('active');
                changesCount.textContent = count + ' pending change' + (count > 1 ? 's' : '');
            } else {
                changesBar.classList.remove('active');
            }
        }

        function renderPagination() {
            const total = state.totalPages, current = state.page;
            if (total <= 1) { pagination.innerHTML = ''; return; }
            let html = '<button class="page-btn" id="prevPageBtn"' + (current <= 1 ? ' disabled' : '') + '>&laquo; Prev</button>';
            buildPageNums(current, total).forEach(function(p) {
                if (p === '...') html += '<span class="page-ellipsis">...</span>';
                else html += '<button class="page-btn' + (p === current ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
            });
            html += '<button class="page-btn" id="nextPageBtn"' + (current >= total ? ' disabled' : '') + '>Next &raquo;</button>';
            pagination.innerHTML = html;
        }

        function buildPageNums(cur, total) {
            if (total <= 7) { var a = []; for (var i = 1; i <= total; i++) a.push(i); return a; }
            var p = [1], s = Math.max(2, cur - 1), e = Math.min(total - 1, cur + 1);
            if (s > 2) p.push('...'); for (var j = s; j <= e; j++) p.push(j); if (e < total - 1) p.push('...');
            p.push(total); return p;
        }

        function renderStatus() {
            statusRows.textContent = 'Rows: ' + fmtNum(state.totalRows);
            statusPage.textContent = 'Page ' + state.page + ' of ' + state.totalPages;
            statusExecTime.textContent = 'Time: ' + state.executionTimeMs + ' ms';
        }

        function render() {
            tableName.textContent = state.tableName || 'Table';
            tableName.title = state.tableName || 'Table';
            renderHead(); renderBody(); renderPagination(); renderStatus(); hideLoading();
        }

        function showLoading() { loadingOverlay.classList.remove('hidden'); }
        function hideLoading() { loadingOverlay.classList.add('hidden'); }
        function showError(msg) { errorBanner.textContent = msg; errorBanner.classList.remove('hidden'); }
        function hideError() { errorBanner.classList.add('hidden'); }
        function send(msg) { vscode.postMessage(msg); }

        gridHead.addEventListener('click', function(e) {
            var th = e.target.closest('th[data-column]'); if (!th) return;
            showLoading(); send({ type: 'sort', column: th.getAttribute('data-column') });
        });

        // FK navigation click
        gridBody.addEventListener('click', function(e) {
            var fkCell = e.target.closest('td.cell-fk');
            if (fkCell) {
                var toTable = fkCell.getAttribute('data-fk-table');
                var toCol = fkCell.getAttribute('data-fk-col');
                var val = fkCell.getAttribute('data-raw');
                if (toTable && toCol && val) {
                    send({ type: 'navigateFK', toTable: toTable, toColumn: toCol, value: val });
                    return;
                }
            }
        });

        let clickedCell = null;
        gridBody.addEventListener('click', function(e) {
            var td = e.target.closest('td:not(.row-num):not(.check-col):not(.cell-fk)'); if (!td) return;
            if (clickedCell) clickedCell.classList.remove('cell-clicked');
            td.classList.add('cell-clicked'); clickedCell = td;
            var raw = td.getAttribute('data-raw');
            if (raw !== null && raw !== '' && !td.classList.contains('editing')) {
                navigator.clipboard.writeText(raw).then(function() { showToast('Copied to clipboard'); }).catch(function() {});
            }
        });

        // Double-click to edit cell
        gridBody.addEventListener('dblclick', function(e) {
            var td = e.target.closest('td.editable');
            if (!td || td.classList.contains('editing')) return;
            var tr = td.closest('tr');
            if (tr && tr.classList.contains('row-deleted')) return;

            var col = td.getAttribute('data-col');
            var rowIdx = td.getAttribute('data-rowidx');
            var newRowIdx = td.getAttribute('data-newrow');
            var currentVal = td.getAttribute('data-raw') || '';

            td.classList.add('editing');
            td.innerHTML = '<input type="text" value="' + esc(currentVal) + '" />';
            var input = td.querySelector('input');
            input.focus();
            input.select();

            function finishEdit() {
                var newVal = input.value;
                td.classList.remove('editing');

                if (newRowIdx !== null && newRowIdx !== undefined && newRowIdx !== '') {
                    // Editing a new row
                    var ni = parseInt(newRowIdx, 10);
                    newRows[ni][col] = newVal;
                    td.setAttribute('data-raw', newVal);
                    td.textContent = newVal || 'click to edit';
                    if (!newVal) td.innerHTML = '<span style="opacity:0.3">click to edit</span>';
                } else if (rowIdx !== null && rowIdx !== undefined && rowIdx !== '') {
                    // Editing existing row
                    var ri = parseInt(rowIdx, 10);
                    var origVal = state.rows[ri][col];
                    var origStr = origVal === null || origVal === undefined ? '' : String(origVal);

                    if (newVal !== origStr) {
                        editedCells[ri + ':' + col] = newVal === '' ? null : newVal;
                        td.classList.add('cell-modified');
                    } else {
                        delete editedCells[ri + ':' + col];
                        td.classList.remove('cell-modified');
                    }
                    td.setAttribute('data-raw', newVal);
                    if (newVal === '' || newVal === null) {
                        td.innerHTML = '<span class="cell-null">NULL</span>';
                    } else {
                        td.textContent = newVal;
                    }
                }
                updateChangesBar();
            }

            input.addEventListener('blur', finishEdit);
            input.addEventListener('keydown', function(ev) {
                if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                if (ev.key === 'Escape') { input.value = currentVal; input.blur(); }
                if (ev.key === 'Tab') {
                    ev.preventDefault();
                    input.blur();
                    // Move to next editable cell
                    var nextTd = td.nextElementSibling;
                    while (nextTd && !nextTd.classList.contains('editable')) nextTd = nextTd.nextElementSibling;
                    if (nextTd) nextTd.dispatchEvent(new MouseEvent('dblclick', { bubbles: true }));
                }
            });
        });

        // Add Row button
        addRowBtn.addEventListener('click', function() {
            if (!canEdit) { showToast('Editing disabled — no primary key'); return; }
            var emptyRow = {};
            state.columns.forEach(function(col) { emptyRow[col] = ''; });
            newRows.push(emptyRow);
            renderBody();
            updateChangesBar();
            // Scroll to top to see new row
            tableContainer.scrollTop = 0;
        });

        // Delete Selected button
        deleteRowsBtn.addEventListener('click', function() {
            if (!canEdit) return;
            gridBody.querySelectorAll('.row-check:checked').forEach(function(cb) {
                var ri = cb.getAttribute('data-rowidx');
                var ni = cb.getAttribute('data-newrow');
                if (ri !== null && ri !== '') {
                    deletedRowIdxs.add(parseInt(ri, 10));
                } else if (ni !== null && ni !== '') {
                    newRows.splice(parseInt(ni, 10), 1);
                }
            });
            renderBody();
            updateChangesBar();
            updateDeleteBtn();
        });

        // Save Changes
        saveBtn.addEventListener('click', function() {
            var changes = [];

            // Edits
            Object.keys(editedCells).forEach(function(key) {
                var parts = key.split(':');
                var ri = parseInt(parts[0], 10);
                var col = parts.slice(1).join(':');
                var row = state.rows[ri];
                var pkValues = {};
                state.primaryKeys.forEach(function(pk) { pkValues[pk] = row[pk]; });
                changes.push({ type: 'update', pkValues: pkValues, column: col, value: editedCells[key] });
            });

            // Deletes
            deletedRowIdxs.forEach(function(ri) {
                var row = state.rows[ri];
                var pkValues = {};
                state.primaryKeys.forEach(function(pk) { pkValues[pk] = row[pk]; });
                changes.push({ type: 'delete', pkValues: pkValues });
            });

            // Inserts
            newRows.forEach(function(row) {
                var hasData = state.columns.some(function(c) { return row[c] !== '' && row[c] !== undefined; });
                if (hasData) changes.push({ type: 'insert', row: row });
            });

            if (changes.length === 0) return;
            showLoading();
            send({ type: 'saveChanges', changes: changes });
        });

        // Discard Changes
        discardBtn.addEventListener('click', function() {
            editedCells = {};
            newRows = [];
            deletedRowIdxs.clear();
            renderBody();
            updateChangesBar();
            updateDeleteBtn();
            showToast('Changes discarded');
        });

        pagination.addEventListener('click', function(e) {
            var btn = e.target.closest('button'); if (!btn || btn.disabled) return;
            if (btn.id === 'prevPageBtn') { showLoading(); send({ type: 'prevPage' }); }
            else if (btn.id === 'nextPageBtn') { showLoading(); send({ type: 'nextPage' }); }
            else if (btn.dataset.page) { var pg = parseInt(btn.dataset.page, 10); if (pg !== state.page) { showLoading(); send({ type: 'goToPage', page: pg }); } }
        });

        let searchTimeout = null;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() { showLoading(); send({ type: 'filter', filter: searchInput.value }); }, 300);
        });

        refreshBtn.addEventListener('click', function() { showLoading(); hideError(); send({ type: 'refresh' }); });
        exportBtn.addEventListener('click', function() { send({ type: 'export' }); });

        window.addEventListener('message', function(event) {
            var msg = event.data; if (!msg || !msg.type) return;
            switch (msg.type) {
                case 'data':
                    hideError();
                    state.columns = msg.columns || []; state.rows = msg.rows || []; state.totalRows = msg.totalRows || 0;
                    state.page = msg.page || 1; state.pageSize = msg.pageSize || 50; state.totalPages = msg.totalPages || 1;
                    state.sortColumn = msg.sortColumn || null; state.sortDirection = msg.sortDirection || null;
                    state.executionTimeMs = msg.executionTimeMs || 0; state.tableName = msg.tableName || 'Table';
                    state.primaryKeys = msg.primaryKeys || [];
                    canEdit = state.primaryKeys.length > 0;
                    fkMap = {};
                    (msg.foreignKeys || []).forEach(function(fk) { fkMap[fk.fromColumn] = { toTable: fk.toTable, toColumn: fk.toColumn }; });
                    noPkMsg.classList.toggle('hidden', canEdit);
                    addRowBtn.style.display = canEdit ? '' : 'none';
                    deleteRowsBtn.style.display = canEdit ? '' : 'none';
                    // Clear pending changes on data reload
                    editedCells = {}; newRows = []; deletedRowIdxs.clear();
                    updateChangesBar();
                    render(); tableContainer.scrollTop = 0; break;
                case 'error': hideLoading(); showError(msg.message || 'An unknown error occurred.'); break;
                case 'saveResult':
                    hideLoading();
                    if (msg.success) {
                        showToast(msg.successCount + ' change' + (msg.successCount > 1 ? 's' : '') + ' saved!');
                        editedCells = {}; newRows = []; deletedRowIdxs.clear();
                        updateChangesBar();
                    } else {
                        showError('Save error: ' + (msg.error || 'Unknown error'));
                        if (msg.successCount > 0) showToast(msg.successCount + ' changes saved, some failed');
                    }
                    break;
            }
        });

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); searchInput.focus(); searchInput.select(); return; }
            if (document.activeElement === searchInput) return;
            if (e.key === 'ArrowLeft' && state.page > 1) { showLoading(); send({ type: 'prevPage' }); }
            if (e.key === 'ArrowRight' && state.page < state.totalPages) { showLoading(); send({ type: 'nextPage' }); }
        });

        showLoading();
    </script>
</body>
</html>
